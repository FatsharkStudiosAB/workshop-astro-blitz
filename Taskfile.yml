version: "3"

vars:
  BUILD_DIR: build
  BUILD_CONFIG: Release

tasks:
  default:
    desc: List all available tasks
    cmds:
      - task --list-all

  configure:
    desc: Generate the CMake build system
    preconditions:
      - sh: test -f CMakeLists.txt
        msg: "CMakeLists.txt not found. Add a CMake project before running this task."
    cmds:
      - cmd: cmake -B {{.BUILD_DIR}} -G "Visual Studio 17 2022" -A x64
        platforms: [windows]
      - cmd: cmake -B {{.BUILD_DIR}} -DCMAKE_BUILD_TYPE={{.BUILD_CONFIG}}
        platforms: [linux, darwin]
    sources:
      - CMakeLists.txt
    generates:
      - "{{.BUILD_DIR}}/CMakeCache.txt"

  build:
    desc: Compile the game
    deps: [configure]
    cmds:
      - cmake --build {{.BUILD_DIR}} --config {{.BUILD_CONFIG}}

  run:
    desc: Build and run the game
    deps: [build]
    cmds:
      # Multi-config generators (Visual Studio) output to build/<Config>/
      - cmd: powershell -Command "if (Test-Path '{{.BUILD_DIR}}/{{.BUILD_CONFIG}}/astro_blitz.exe') { & './{{.BUILD_DIR}}/{{.BUILD_CONFIG}}/astro_blitz.exe' } elseif (Test-Path '{{.BUILD_DIR}}/astro_blitz.exe') { & './{{.BUILD_DIR}}/astro_blitz.exe' } else { Write-Error 'Executable not found'; exit 1 }"
        platforms: [windows]
      # Single-config generators (Makefiles, Ninja) output to build/
      - cmd: '{{.BUILD_DIR}}/{{.BUILD_CONFIG}}/astro_blitz || {{.BUILD_DIR}}/astro_blitz'
        platforms: [linux, darwin]

  test:
    desc: Build and run all tests
    deps: [configure]
    cmds:
      # On multi-config generators (Visual Studio), --config Debug selects the config.
      # On single-config generators, the build type was set at configure time (Release).
      # Tests still compile and run correctly in Release on single-config platforms.
      - cmake --build {{.BUILD_DIR}} --config Debug
      - ctest --test-dir {{.BUILD_DIR}} -C Debug --output-on-failure

  clean:
    desc: Remove all build artifacts
    cmds:
      - cmd: powershell -Command "if (Test-Path '{{.BUILD_DIR}}') { Remove-Item -Recurse -Force '{{.BUILD_DIR}}' }"
        platforms: [windows]
      - cmd: rm -rf {{.BUILD_DIR}}
        platforms: [linux, darwin]

  # ── Linting / Formatting ───────────────────────────────────────────────────

  fmt:
    desc: Run linters for changed file types vs HEAD (use fmt:all to run everything)
    vars:
      CHANGED_FILES:
        sh: (git diff --name-only HEAD; git ls-files --others --exclude-standard)
    cmds:
      - task: fmt:c
        vars:
          RUN: '{{ if or (regexMatch "(?m)\\.[ch]$" .CHANGED_FILES) (regexMatch "(?m)\\.clang-format$" .CHANGED_FILES) }}true{{ else }}false{{ end }}'
      - task: fmt:yaml
        vars:
          RUN: '{{ if or (regexMatch "(?m)\\.(ya?ml)$" .CHANGED_FILES) (regexMatch "(?m)(^|/)\\.(yamllint)" .CHANGED_FILES) }}true{{ else }}false{{ end }}'
      - task: fmt:markdown
        vars:
          RUN: '{{ if or (regexMatch "(?m)\\.md$" .CHANGED_FILES) (regexMatch "(?m)(^|/)\\.markdownlint" .CHANGED_FILES) }}true{{ else }}false{{ end }}'

  fmt:all:
    desc: Run all linters unconditionally
    cmds:
      - task: fmt:c
        vars:
          RUN: "true"
      - task: fmt:yaml
        vars:
          RUN: "true"
      - task: fmt:markdown
        vars:
          RUN: "true"

  fmt:c:
    desc: Run clang-format on C source files (auto-fix)
    internal: true
    status:
      - '{{ if eq .RUN "true" }}exit 1{{ else }}exit 0{{ end }}'
    cmds:
      - cmd: powershell -NoProfile -ExecutionPolicy Bypass -File scripts/clang-format-all.ps1
        platforms: [windows]
      - cmd: find src tests \( -name '*.c' -o -name '*.h' \) -exec clang-format -i {} +
        platforms: [linux, darwin]

  fmt:yaml:
    desc: Run yamllint on YAML files (check-only)
    internal: true
    status:
      - '{{ if eq .RUN "true" }}exit 1{{ else }}exit 0{{ end }}'
    vars:
      PYTHON:
        sh: py -3 -c "import sys; print(sys.executable)" 2>/dev/null || python3 -c "import sys; print(sys.executable)" 2>/dev/null || python -c "import sys; print(sys.executable)"
    cmds:
      - '"{{.PYTHON}}" -m yamllint .'

  fmt:markdown:
    desc: Run markdownlint on Markdown files (check-only)
    internal: true
    status:
      - '{{ if eq .RUN "true" }}exit 1{{ else }}exit 0{{ end }}'
    cmds:
      - markdownlint-cli2 "**/*.md"

  install-yamllint:
    desc: Install yamllint (YAML linter). Requires Python.
    preconditions:
      - sh: py -3 --version || python3 --version || python --version
        msg: Python needs to be installed and in PATH to install yamllint
    vars:
      PYTHON:
        sh: py -3 -c "import sys; print(sys.executable)" 2>/dev/null || python3 -c "import sys; print(sys.executable)" 2>/dev/null || python -c "import sys; print(sys.executable)"
    cmds:
      - '"{{.PYTHON}}" -m pip install --user yamllint'
    status:
      - '"{{.PYTHON}}" -m yamllint --version'

  install-markdownlint:
    desc: Install markdownlint-cli2 (Markdown linter). Requires Node.js.
    preconditions:
      - sh: npm --version
        msg: Node.js/npm needs to be installed and in PATH to install markdownlint-cli2
    cmds:
      - npm install -g markdownlint-cli2
    status:
      - markdownlint-cli2 --help
