---
# markdownlint-cli2 configuration
# https://github.com/DavidAnson/markdownlint-cli2

ignores:
  - "build/**"

config:
  # Allow long lines -- tables, URLs, and code blocks routinely exceed 80 chars
  MD013: false

  # Allow duplicate headings in different sections (e.g. multiple "Added" in CHANGELOG)
  MD024:
    siblings_only: true

  # Allow trailing punctuation in headings (e.g. dates, question marks)
  MD026: false

  # Allow inline HTML (useful for occasional formatting)
  MD033: false

  # Allow emphasis as headings (e.g. sprint names in design doc)
  MD036: false

  # Disable table column style (compact tables are fine)
  MD060: false
